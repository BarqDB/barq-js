name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Compiles the barq-core engine (the native library the SDK links against),
  # proving the vendored submodule builds from source on CI.
  engine:
    name: barq-core engine (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout (with barq-core submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build libssl-dev zlib1g-dev

      - name: Configure barq-core (library only)
        run: |
          cmake -S packages/barq/bindgen/vendor/barq-core -B core-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBARQ_BUILD_LIB_ONLY=ON \
            -DBARQ_NO_TESTS=ON \
            -DBARQ_USE_SYSTEM_OPENSSL=ON

      - name: Build the Storage library
        run: cmake --build core-build --target Storage --parallel

      - name: Show the built artifact
        run: |
          echo "Built barq-core static library:"
          find core-build -name 'libStorage*' -o -name 'Storage.lib' | head
          find core-build -name 'libStorage*' -exec ls -lh {} \;

  # Type-checks and runs the Barq value types (our own ObjectId / UUID /
  # Decimal128 / Binary / EJSON that replace the types dependency).
  datatypes:
    name: Barq value types
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Type-check value types (strict)
        run: >
          npx --yes --package typescript@5.5 tsc --noEmit --strict --target es2020
          --moduleResolution node --skipLibCheck --lib es2020
          packages/barq/src/types/random.ts
          packages/barq/src/types/Binary.ts
          packages/barq/src/types/ObjectId.ts
          packages/barq/src/types/UUID.ts
          packages/barq/src/types/Decimal128.ts
          packages/barq/src/types/EJSON.ts
          packages/barq/src/types/index.ts

      - name: Run value-type round-trip tests
        run: npx --yes tsx packages/barq/src/types/__ci_test.ts

  # Generates the JS<->C++ binding from barq-core's spec and compiles the native
  # @barqdb/barq node addon (linking barq-core).
  napi:
    name: Native addon (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout (with barq-core submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build libssl-dev zlib1g-dev build-essential

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps --ignore-scripts --no-audit --no-fund

      - name: Generate the binding (wrapper + jsi)
        run: |
          npm run bindgen:wrapper --workspace @barqdb/barq
          npm run bindgen:jsi --workspace @barqdb/barq

      - name: Show generated binding
        run: |
          echo "wrapper.generated.ts:"; wc -l packages/barq/src/binding/wrapper.generated.ts
          echo "jsi_init.cpp:"; wc -l packages/barq/binding/jsi/jsi_init.cpp

      - name: Build the native addon
        run: npm run build:node --workspace @barqdb/barq

      - name: Verify barq.node was produced
        run: |
          set -euo pipefail
          node_file="$(find packages/barq -name 'barq.node' | head -1)"
          test -n "$node_file"
          ls -lh "$node_file"
          echo "Built native addon: $node_file"

  # Builds the native @barqdb/barq addon on Windows x64. OpenSSL + zlib come from
  # the barq-core `dependencies` release (windows-static prebuilts), fetched by the
  # default barq_acquire_dependency path — same mechanism as Android. Mirrors the
  # release prebuild command (minus the -u upload).
  napi-windows:
    name: Native addon (Windows x64)
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      # barq-core is a submodule with deep source paths; enable long-path
      # support before checkout so the recursive fetch cannot trip MAX_PATH.
      - name: Enable Git long paths
        run: git config --global core.longpaths true

      - name: Checkout (with barq-core submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps --ignore-scripts --no-audit --no-fund

      - name: Generate the binding (wrapper + jsi)
        run: |
          npm run bindgen:wrapper --workspace @barqdb/barq
          npm run bindgen:jsi --workspace @barqdb/barq

      - name: Build the native addon (prebuild + cmake-js; OpenSSL/zlib from barq-core deps)
        shell: pwsh
        working-directory: packages/barq
        run: >
          npx prebuild --runtime napi --target 6 --backend cmake-js --
          --directory binding/node

      - name: Verify barq.node was produced
        shell: pwsh
        run: |
          $f = Get-ChildItem -Recurse -Path packages/barq -Filter barq.node -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $f) { throw "barq.node not found" }
          "Built: $($f.FullName) ($([math]::Round($f.Length/1MB,1)) MB)"

  # Builds the native addon on macOS — arm64 natively and x64 cross-compiled —
  # both on the arm64 macos-14 runner (Intel macos-13 runners are scarce). This
  # validates the exact cross-compile the release uses, incl. that the x64 slice
  # really is x86_64.
  napi-macos:
    name: Native addon (macOS ${{ matrix.arch }})
    runs-on: macos-14
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: arm64, osx_arch: arm64 }
          - { arch: x64, osx_arch: x86_64 }
    steps:
      - name: Checkout (with barq-core submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build tools
        run: brew install cmake ninja

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps --ignore-scripts --no-audit --no-fund

      - name: Generate the binding (wrapper + jsi)
        run: |
          npm run bindgen:wrapper --workspace @barqdb/barq
          npm run bindgen:jsi --workspace @barqdb/barq

      - name: Build the native addon (arch=${{ matrix.arch }})
        working-directory: packages/barq
        run: |
          npx prebuild --runtime napi --target 6 --arch ${{ matrix.arch }} --backend cmake-js \
            -- --directory binding/node --CDCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }}

      - name: Verify barq.node arch is ${{ matrix.osx_arch }}
        run: |
          set -euo pipefail
          node_file="$(find packages/barq -name 'barq.node' | head -1)"
          test -n "$node_file"
          echo "Built: $node_file"
          file "$node_file"
          file "$node_file" | grep -q "${{ matrix.osx_arch }}"
          echo "Arch OK: ${{ matrix.osx_arch }}"
