name: Release

# Publishes the @barq/* packages to npm whenever a version tag is pushed.
# Each package is published at whatever version is in its package.json; versions
# already present on the registry are skipped, so a single `v*` tag can release
# whichever packages actually changed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # enables npm provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm token is configured
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::The NPM_TOKEN secret is not set. Add it in the repository settings (Settings → Secrets and variables → Actions)."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build publishable packages
        # Build each package that defines a build script. The native @barq/barq
        # prebuilds are produced by the platform-specific prebuild jobs and are
        # not required to publish the source package (consumers fall back to
        # `prebuild-install`).
        run: |
          set -euo pipefail
          for pkg in common fetch babel-plugin mocha-reporter tools react; do
            dir="packages/$(ls packages | grep -E "(^|-)${pkg}$" | head -n1)"
            [ -d "$dir" ] || dir=""
          done
          # Build via each workspace's own build/bundle script when present.
          npm run --workspaces --if-present build
          npm run --workspaces --if-present bundle

      - name: Publish changed packages
        run: |
          set -euo pipefail
          published=0
          for pkgjson in $(find packages -maxdepth 2 -name package.json -not -path '*/node_modules/*'); do
            dir="$(dirname "$pkgjson")"
            name="$(node -p "require('./$pkgjson').name || ''")"
            version="$(node -p "require('./$pkgjson').version || ''")"
            private="$(node -p "!!require('./$pkgjson').private")"
            case "$name" in
              @barq/*) ;;
              *) continue ;;
            esac
            if [ "$private" = "true" ] || [ -z "$version" ]; then
              echo "Skipping $name (private or versionless)"
              continue
            fi
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "Skipping $name@$version (already on npm)"
              continue
            fi
            echo "Publishing $name@$version"
            ( cd "$dir" && npm publish --access public --provenance )
            published=$((published + 1))
          done
          echo "Published $published package(s)."
