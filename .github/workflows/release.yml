name: Release

# Publishes the @barqdb/* packages to npm whenever a version tag is pushed.
# Each package is published at whatever version is in its package.json; versions
# already present on the registry are skipped, so a single `v*` tag can release
# whichever packages actually changed.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and pack the packages without publishing to npm"
        type: boolean
        default: true

permissions:
  contents: write # upload native prebuilds to the GitHub Release
  id-token: write # enables npm provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Build the native barq.node prebuild per platform and upload it to the release
  # so `prebuild-install` fetches it on `npm install @barqdb/barq`.
  prebuild:
    name: Prebuild (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, name: linux-x64 }
          - { os: macos-13, name: darwin-x64 }
          - { os: macos-14, name: darwin-arm64 }
          - { os: windows-latest, name: win32-x64 }
    steps:
      - name: Checkout (with barq-core submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build libssl-dev zlib1g-dev build-essential

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps --ignore-scripts --no-audit --no-fund

      - name: Generate the binding
        run: |
          npm run bindgen:wrapper --workspace @barqdb/barq
          npm run bindgen:jsi --workspace @barqdb/barq

      - name: Build and upload the native prebuild (Unix)
        if: runner.os != 'Windows'
        working-directory: packages/barq
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx prebuild --runtime napi --target 6 --backend cmake-js -u "$GITHUB_TOKEN" \
            -- --directory binding/node --CDBARQ_USE_SYSTEM_OPENSSL=ON

      # Windows uses pwsh and the barq-core dependency prebuilts for OpenSSL/zlib
      # (no system-openssl flag), matching the proven build.yml Windows job.
      - name: Build and upload the native prebuild (Windows)
        if: runner.os == 'Windows'
        working-directory: packages/barq
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          npx prebuild --runtime napi --target 6 --backend cmake-js -u $env:GITHUB_TOKEN
          -- --directory binding/node

  publish:
    name: Publish to npm
    needs: prebuild
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm token is configured
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::The NPM_TOKEN secret is not set. Add it in the repository settings (Settings → Secrets and variables → Actions)."
            exit 1
          fi

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts --no-audit --no-fund

      - name: Install build tools for @barqdb/barq
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build libssl-dev zlib1g-dev build-essential

      - name: Build packages
        run: |
          set -euo pipefail
          # Native @barqdb/barq: generate the binding and build the TypeScript layer.
          # (Native prebuilds are built/uploaded by the `prebuild` matrix and are
          # fetched by prebuild-install at consumer install time.)
          npm run bindgen:wrapper --workspace @barqdb/barq
          npm run bindgen:jsi --workspace @barqdb/barq
          npm run build:ts --workspace @barqdb/barq
          # Pure-JS packages: build/bundle each that defines the script.
          npm run --workspaces --if-present build
          npm run --workspaces --if-present bundle

      - name: Publish changed packages
        env:
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && 'true' || 'false' }}
        run: |
          set -euo pipefail
          published=0
          for pkgjson in $(find packages -maxdepth 2 -name package.json -not -path '*/node_modules/*'); do
            dir="$(dirname "$pkgjson")"
            name="$(node -p "require('./$pkgjson').name || ''")"
            version="$(node -p "require('./$pkgjson').version || ''")"
            private="$(node -p "!!require('./$pkgjson').private")"
            case "$name" in
              @barqdb/*) ;;
              *) continue ;;
            esac
            if [ "$private" = "true" ] || [ -z "$version" ]; then
              echo "Skipping $name (private or versionless)"
              continue
            fi
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "Skipping $name@$version (already on npm)"
              continue
            fi
            if [ "$DRY_RUN" = "true" ]; then
              echo "Dry-run pack $name@$version"
              ( cd "$dir" && npm publish --access public --dry-run )
            else
              echo "Publishing $name@$version"
              ( cd "$dir" && npm publish --access public --provenance )
            fi
            published=$((published + 1))
          done
          echo "Processed $published package(s)."
