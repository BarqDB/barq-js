# yaml-language-server: $schema=vendor/barq-core/bindgen/generated/spec.schema.json

headers:
  - "platform.hpp"
  - "token_user.hpp"

classes:
  # Token-based sync user API. barq-core wraps users as a base `SyncUser`, but the
  # token operations live on the concrete `TokenSyncUser`; these static helpers
  # downcast internally (see binding/token_user.hpp) so a single `SyncUser`
  # binding class stays sufficient everywhere else.
  JsTokenUser:
    abstract: true
    staticMethods:
      from_token: '(tenant_id: std::string, user_id: std::string, access_token: std::string) -> SharedSyncUser'
      tenant_id: '(user: SharedSyncUser) -> std::string'
      user_id: '(user: SharedSyncUser) -> std::string'
      access_token: '(user: SharedSyncUser) -> std::string'
      refresh_token: '(user: SharedSyncUser) -> std::string'
      state: '(user: SharedSyncUser) -> SyncUserState'
      set_route: '(user: SharedSyncUser, route: std::string, verified: bool)'
      set_access_token: '(user: SharedSyncUser, access_token: std::string)'
      mark_access_token_refresh_required: '(user: SharedSyncUser)'
      log_out: '(user: SharedSyncUser)'
      set_user_agent: '(user: SharedSyncUser, user_agent: std::string)'
      set_session_multiplexing: '(user: SharedSyncUser, allowed: bool)'
      reconnect: '(user: SharedSyncUser)'
      has_existing_sessions: '(user: SharedSyncUser) -> bool'
      get_all_sessions_for: '(user: SharedSyncUser) -> std::vector<SharedSyncSession>'
      get_existing_active_session: '(user: SharedSyncUser, path: std::string) -> Nullable<SharedSyncSession>'

  JsPlatformHelpers:
    abstract: true
    staticMethods:
      set_default_barq_file_directory: '(dir: std::string)'
      default_barq_file_directory: () -> std::string
      ensure_directory_exists_for_file: '(file: const std::string&)'
      copy_bundled_barq_files: ()
      remove_barq_files_from_directory: '(directory: const std::string&)'
      remove_file: '(path: const std::string&)'
      remove_directory: '(path: const std::string&)'
      exclude_from_icloud_backup: '(path: const std::string&, value: bool)'
      get_cpu_arch: () -> std::string
      # print: (const char* fmt, ...) # can't expose varargs directly. Could expose a fixed overload.

  WeakSyncSession:
    cppName: std::weak_ptr<SyncSession>
    constructors:
      weak_copy_of: '(shared: SharedSyncSession)'
    methods:
      raw_dereference:
        sig: '() const -> Nullable<SharedSyncSession>'
        cppName: lock
